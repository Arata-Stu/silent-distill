seed: 42
device: cuda
task: flow
checkpoint: /path/to/checkpoint_last.pt
output_file: outputs/eval/m3ed_flow.json
data:
  root: /datasets/m3ed
  manifest: outputs/m3ed/manifests_dense/test_flow.jsonl
  event_camera: left
  event_group: /prophesee/left
  timestamp_scale_to_us: 1
  timestamp_offset_us: null
  flow_target_duration_us: null
  height: 720
  width: 1280
  bins: 5
  short_window_us: 50000
  long_window_us: 100000
  use_polarity: true
  representation: count
  occupancy_stride: 8
  temporal_shuffle: false
  horizontal_flip_probability: 0.0
model:
  backbone: resnet50
  small_stem: false
  decoder_channels: 128
  recurrent: none
training:
  batch_size: 1
  num_workers: 4
evaluation:
  low_density_max: 0.001
  high_density_min: 0.01
