seed: 42
device: cuda
task: detection
checkpoint: outputs/finetune/prophesee_1mp_detection_1ms/checkpoint_last.pt
output_file: outputs/eval/prophesee_1mp_detection_1ms.json

data:
  root: /datasets/prophesee_1mpx
  manifest: /datasets/prophesee_1mpx/manifests/test_detection.jsonl
  event_camera: left
  event_group: null
  timestamp_scale_to_us: null
  timestamp_offset_us: null
  detection_class_ids: [0, 1, 2]
  detection_min_box_diagonal: 60.0
  height: 720
  width: 1280
  bins: 5
  short_window_us: 1000
  long_window_us: 5000
  use_polarity: true
  representation: count
  occupancy_stride: 8
  temporal_shuffle: false
  horizontal_flip_probability: 0.0

model:
  backbone: resnet50
  small_stem: false
  num_classes: 4
  min_size: 720
  max_size: 1280

training:
  batch_size: 2
  num_workers: 8

evaluation:
  low_density_max: 0.001
  high_density_min: 0.01
