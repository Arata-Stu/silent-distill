seed: 42
device: cuda
task: flow
checkpoint: /path/to/dsec_flow_checkpoint.pt
submission_dir: outputs/dsec/submission/flow
archive_file: outputs/dsec/submission/dsec_flow.zip
report_file: outputs/dsec/submission/dsec_flow_report.json
valid_channel_value: 1
require_official_sequences: true

data:
  root: /datasets/dsec
  manifest: outputs/dsec/manifests_dense/test_flow_submission.jsonl
  event_camera: left
  event_group: /events
  timestamp_scale_to_us: 1.0
  timestamp_offset_us: null
  height: 480
  width: 640
  bins: 5
  short_window_us: 100000
  long_window_us: 200000
  use_polarity: true
  representation: count
  occupancy_stride: 8
  temporal_shuffle: false
  horizontal_flip_probability: 0.0
  sequence_length: 1

model:
  backbone: resnet50
  small_stem: false
  decoder_channels: 128
  recurrent: none

training:
  batch_size: 4
  num_workers: 4

evaluation:
  low_density_max: 0.001
  high_density_min: 0.01
