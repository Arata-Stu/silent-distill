seed: 42
device: cuda
run_name: prophesee_1mp_resnet50
output_dir: ${hydra:runtime.output_dir}

tensorboard:
  enabled: true
  log_dir: ${output_dir}/tensorboard
  flush_secs: 30

data:
  root: /datasets/prophesee_1mpx
  manifest: /datasets/prophesee_1mpx/manifests/train_ssl.jsonl
  event_camera: left
  event_group: null
  timestamp_scale_to_us: null
  timestamp_offset_us: null
  height: 720
  width: 1280
  bins: 5
  short_window_us: 10000
  long_window_us: 50000
  use_polarity: true
  representation: count
  occupancy_stride: 8
  temporal_shuffle: false
  horizontal_flip_probability: 0.5
  sequence_length: 1
  sequence_step: 1
  sequence_stride: 1
  max_sequence_gap_us: 0

model:
  backbone: resnet50
  small_stem: false
  projection_hidden_dim: 2048
  projection_dim: 256
  ema_momentum: 0.996
  ema_momentum_end: 1.0
  multi_scale_distillation: true
  distillation_scales: all
  recurrent: none
  recurrent_hidden_dim: 2048
  recurrent_layers: 1
  recurrent_dropout: 0.0

loss:
  lambda_s2l: 1.0
  lambda_silence: 1.0
  lambda_polarity: 0.0
  lambda_rate: 0.0
  negative_modes: [random, near]
  negative_ratio: 3.0
  negative_weight: 1.0
  near_radius: 2
  min_negatives: 1024

training:
  epochs: 100
  batch_size: 2
  gradient_accumulation_steps: 1
  num_workers: 8
  learning_rate: 0.0002
  minimum_lr: 0.000002
  weight_decay: 0.05
  warmup_epochs: 5
  gradient_clip_norm: 1.0
  amp: true
  log_every: 20
  save_every_epochs: 5
  resume: null

hydra:
  run:
    dir: ./outputs/train/${now:%Y-%m-%d}/${now:%H-%M-%S}_${run_name}
  sweep:
    dir: ./outputs/multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}_${run_name}
    subdir: ${hydra.job.num}
  job:
    chdir: false
