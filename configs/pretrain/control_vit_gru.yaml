seed: 42
device: cuda
run_name: control_vit_small_gru
output_dir: ${hydra:runtime.output_dir}

tensorboard:
  enabled: true
  log_dir: ${output_dir}/tensorboard
  flush_secs: 30

data:
  root: /datasets/control_events
  manifest: /datasets/control_events/manifests/train_ssl.jsonl
  height: 128
  width: 128
  bins: 5
  short_window_us: 1000
  long_window_us: 5000
  use_polarity: true
  representation: count
  occupancy_stride: 4
  temporal_shuffle: false
  horizontal_flip_probability: 0.0
  sequence_length: 4
  sequence_step: 1
  sequence_stride: 1
  max_sequence_gap_us: 10000

model:
  backbone: vit_small
  small_stem: false
  vit_patch_size: 8
  vit_embed_dim: 384
  vit_depth: 8
  vit_num_heads: 6
  vit_mlp_ratio: 4.0
  vit_dropout: 0.0
  projection_hidden_dim: 768
  projection_dim: 256
  ema_momentum: 0.99
  ema_momentum_end: 1.0
  multi_scale_distillation: true
  distillation_scales: all
  recurrent: gru
  recurrent_hidden_dim: 384
  recurrent_layers: 1
  recurrent_dropout: 0.0

loss:
  lambda_s2l: 1.0
  lambda_silence: 1.0
  lambda_polarity: 0.0
  lambda_rate: 0.0
  negative_modes: [random, near]
  negative_ratio: 3.0
  negative_weight: 1.0
  near_radius: 2
  min_negatives: 256

training:
  epochs: 50
  batch_size: 16
  num_workers: 8
  learning_rate: 0.0003
  minimum_lr: 0.000003
  weight_decay: 0.05
  warmup_epochs: 5
  gradient_clip_norm: 1.0
  amp: true
  log_every: 20
  save_every_epochs: 5
  resume: null

hydra:
  run:
    dir: ./outputs/train/${now:%Y-%m-%d}/${now:%H-%M-%S}_${run_name}
  sweep:
    dir: ./outputs/multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}_${run_name}
    subdir: ${hydra.job.num}
  job:
    chdir: false
