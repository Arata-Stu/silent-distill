seed: 42
device: cuda
output_dir: outputs/pretrain/control_sla

data:
  root: /datasets/control_events
  manifest: /datasets/control_events/manifests/train_ssl.jsonl
  height: 128
  width: 128
  bins: 5
  short_window_us: 1000
  long_window_us: 5000
  use_polarity: true
  representation: count
  occupancy_stride: 4
  temporal_shuffle: false
  horizontal_flip_probability: 0.0

model:
  backbone: resnet18
  small_stem: true
  projection_hidden_dim: 512
  projection_dim: 128
  ema_momentum: 0.99
  ema_momentum_end: 1.0

loss:
  lambda_s2l: 1.0
  lambda_silence: 1.0
  lambda_polarity: 0.0
  lambda_rate: 0.0
  negative_modes: [random, near]
  negative_ratio: 3.0
  negative_weight: 1.0
  near_radius: 2
  min_negatives: 256

training:
  epochs: 50
  batch_size: 64
  num_workers: 8
  learning_rate: 0.001
  minimum_lr: 0.00001
  weight_decay: 0.05
  warmup_epochs: 5
  gradient_clip_norm: 1.0
  amp: true
  log_every: 20
  save_every_epochs: 5
  resume: null
