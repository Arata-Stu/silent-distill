seed: 42
device: cuda
task: flow
run_name: dsec_flow_resnet50
output_dir: ${hydra:runtime.output_dir}

tensorboard:
  enabled: true
  log_dir: ${output_dir}/tensorboard
  flush_secs: 30

data:
  root: /datasets/dsec
  train_manifest: outputs/dsec/manifests_dense/train_flow.jsonl
  validation_manifest: outputs/dsec/manifests_dense/val_flow.jsonl
  event_camera: left
  event_group: /events
  timestamp_scale_to_us: 1.0
  timestamp_offset_us: null
  flow_target_duration_us: null
  height: 480
  width: 640
  bins: 5
  short_window_us: 100000
  long_window_us: 200000
  use_polarity: true
  representation: count
  occupancy_stride: 8
  temporal_shuffle: false
  horizontal_flip_probability: 0.5
  sequence_length: 1

model:
  backbone: resnet50
  small_stem: false
  decoder_channels: 128
  recurrent: none

training:
  pretrained_checkpoint: ${oc.env:PRETRAINED_CHECKPOINT,null}
  require_pretraining_window_match: true
  resume: null
  epochs: 50
  freeze_backbone_epochs: 0
  batch_size: 2
  gradient_accumulation_steps: 8
  num_workers: 4
  learning_rate: 0.0001
  minimum_lr: 0.000001
  weight_decay: 0.0001
  warmup_epochs: 2
  gradient_clip_norm: 1.0
  amp: true
  log_every: 20
  save_every_epochs: 5

evaluation:
  every_epochs: 1
  monitor: sequence_average/aepe
  monitor_mode: min
  visualize_samples: 6
  visualization_max_flow: null
  visualization_magnitude_percentile: 99.0
  low_density_max: 0.001
  high_density_min: 0.01

hydra:
  run:
    dir: ./outputs/downstream/${now:%Y-%m-%d}/${now:%H-%M-%S}_${run_name}
  job:
    chdir: false
