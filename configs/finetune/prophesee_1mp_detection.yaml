seed: 42
device: cuda
task: detection
output_dir: outputs/finetune/prophesee_1mp_detection_1ms

data:
  root: /datasets/prophesee_1mpx
  train_manifest: /datasets/prophesee_1mpx/manifests/train_detection.jsonl
  validation_manifest: /datasets/prophesee_1mpx/manifests/val_detection.jsonl
  event_camera: left
  event_group: null
  timestamp_scale_to_us: null
  timestamp_offset_us: null
  detection_class_ids: [0, 1, 2]
  detection_min_box_diagonal: 60.0
  height: 720
  width: 1280
  bins: 5
  short_window_us: 1000
  long_window_us: 5000
  use_polarity: true
  representation: count
  occupancy_stride: 8
  temporal_shuffle: false
  horizontal_flip_probability: 0.5

model:
  backbone: resnet50
  small_stem: false
  num_classes: 4
  min_size: 720
  max_size: 1280

training:
  pretrained_checkpoint: outputs/pretrain/prophesee_1mp_sla/checkpoint_last.pt
  resume: null
  epochs: 50
  freeze_backbone_epochs: 0
  batch_size: 2
  num_workers: 8
  learning_rate: 0.0001
  minimum_lr: 0.000001
  weight_decay: 0.0001
  warmup_epochs: 2
  gradient_clip_norm: 1.0
  amp: true
  log_every: 20
  save_every_epochs: 5

evaluation:
  every_epochs: 5
  low_density_max: 0.001
  high_density_min: 0.01
